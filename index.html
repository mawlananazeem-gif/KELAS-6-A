<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Class 6A - Graduation</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #b21f1f;
            --gold: #fdbb2d;
            --boy-color: #3498db;
            --girl-color: #ff4757;
        }
        
        /* BACKGROUND ESTETIK DENGAN GRADASI & PARTIKEL BERJATUHAN */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            /* Gradasi latar belakang yang estetik dan lembut */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            text-align: center;
            color: #333;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* EFEK PARTIKEL KERTAS WISUDA BERJATUHAN */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(var(--gold) 10%, transparent 10%),
                radial-gradient(var(--accent) 10%, transparent 10%),
                radial-gradient(var(--primary) 10%, transparent 10%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px, 30px 30px;
            opacity: 0.1; /* Transparansi partikel */
            z-index: -1;
            animation: confetti-fall 10s linear infinite;
        }

        @keyframes confetti-fall {
            0% { background-position: 0 0, 15px 15px, 30px 30px; }
            100% { background-position: 0 500px, 15px 515px, 30px 530px; }
        }
