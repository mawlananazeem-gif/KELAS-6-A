    <style>

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .card { background: white; padding: 15px; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-boy { border-left: 6px solid var(--boy); color: var(--boy); }
        .card-girl { border-left: 6px solid var(--girl); color: var(--girl); }

        /* EFEK LOVE */
        #love-btn { 
            position: fixed; bottom: 20px; right: 20px; 
            background: #ff4757; color: white; border: none; 
            padding: 15px; border-radius: 50%; font-size: 20px; 
            box-shadow: 0 5px 15px rgba(255,71,87,0.4); cursor: pointer; z-index: 1000;
        }
        
        .extra { font-family: 'Bebas Neue'; color: #888; margin: 40px 0; font-size: 25px; }
        footer { background: #111; color: white; padding: 30px; margin-top: 50px; font-size: 14px; }
    </style>
